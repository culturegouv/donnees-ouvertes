name: Analyse geo

on:
  workflow_dispatch:

jobs:
  run-analyse-geo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas csv-detective

      - name: Run script
        run: |
          mkdir -p output
          python script/analyse-geo.py > output/analyse-geo.txt

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: analyse-geo-result
          path: output/analyse-geo.txt